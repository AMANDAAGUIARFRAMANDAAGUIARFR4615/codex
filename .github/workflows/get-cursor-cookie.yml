name: Get Cursor Cookie

on:
  workflow_dispatch:
    inputs:
      account:
        description: "邮箱凭证，格式: 邮箱----邮箱密码"
        required: true
        type: string
        default: "SapphiraCaelum5932@outlook.com----rq757721"

jobs:
  get-cookie:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify system Google Chrome
        run: |
          "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" --version

      - name: Install cliclick
        run: brew install cliclick

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download Cookie-Editor extension
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python scripts/install_extension.py extensions/cookie-editor
          echo "COOKIE_EDITOR_DIR=$GITHUB_WORKSPACE/extensions/cookie-editor" >> "$GITHUB_ENV"

      - name: Login Cursor and export cookies
        env:
          PYTHONUNBUFFERED: "1"
          PYTHONIOENCODING: utf-8
          PLAYWRIGHT_CHANNEL: chrome
          PLAYWRIGHT_HEADLESS: "false"
          LOAD_COOKIE_EXTENSION: "false"
          ACCOUNT_CREDENTIALS: ${{ inputs.account }}
          COOKIE_OUTPUT_FILE: cursor-cookies.json
        run: |
          cd scripts
          python -u login.py "$ACCOUNT_CREDENTIALS"

      - name: Upload debug artifacts
        if: always() && (failure() || cancelled())
        uses: actions/upload-artifact@v4
        with:
          name: login-debug
          path: scripts/debug/
          if-no-files-found: ignore

      - name: Upload cookie artifact
        uses: actions/upload-artifact@v4
        with:
          name: cursor-cookies
          path: scripts/cursor-cookies.json
          if-no-files-found: error

      - name: Print cookies to log
        run: |
          echo "========== Cursor Cookies (Cookie-Editor JSON) =========="
          cat scripts/cursor-cookies.json
          echo "========================================================="
