name: Import Claude Cookie

on:
  workflow_dispatch:
    inputs:
      cookie_file:
        description: "Cookie-Editor JSON 文件路径（相对仓库根目录）"
        required: false
        type: string
        default: "cookie.json"

jobs:
  import-cookie:
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Verify system Google Chrome
        run: |
          "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" --version

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download Cookie-Editor extension
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python scripts/install_extension.py extensions/cookie-editor
          echo "COOKIE_EDITOR_DIR=$GITHUB_WORKSPACE/extensions/cookie-editor" >> "$GITHUB_ENV"

      - name: Pass Cloudflare and import cookies
        timeout-minutes: 10
        env:
          PYTHONUNBUFFERED: "1"
          PYTHONIOENCODING: utf-8
          PLAYWRIGHT_CHANNEL: chrome
          PLAYWRIGHT_HEADLESS: "false"
          LOAD_COOKIE_EXTENSION: "true"
          COOKIE_INPUT_FILE: ${{ inputs.cookie_file }}
          CAPSOLVER_API_KEY: ${{ secrets.CAPSOLVER_API_KEY }}
        run: |
          cd scripts
          python -u login.py "$COOKIE_INPUT_FILE"

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-import-debug
          path: scripts/debug/
          if-no-files-found: ignore

      - name: Upload result screenshot
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: claude-after-import
          path: scripts/debug/claude-after-import.png
          if-no-files-found: error
