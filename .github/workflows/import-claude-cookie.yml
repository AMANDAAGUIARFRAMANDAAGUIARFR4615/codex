name: Ask Claude

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: "要向 claude.ai 提的问题"
        required: true
        type: string
        default: "用一句话介绍你自己。"
      cookie_file:
        description: "Cookie-Editor JSON 文件路径（相对仓库根目录）"
        required: false
        type: string
        default: "cookie.json"

jobs:
  import-cookie:
    runs-on: macos-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install patchright Chromium
        run: patchright install chromium

      - name: Download Cookie-Editor extension
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python scripts/install_extension.py extensions/cookie-editor
          echo "COOKIE_EDITOR_DIR=$GITHUB_WORKSPACE/extensions/cookie-editor" >> "$GITHUB_ENV"

      - name: Login and ask Claude
        timeout-minutes: 15
        env:
          PYTHONUNBUFFERED: "1"
          PYTHONIOENCODING: utf-8
          PLAYWRIGHT_HEADLESS: "false"
          LOAD_COOKIE_EXTENSION: "true"
          COOKIE_INPUT_FILE: ${{ inputs.cookie_file }}
          CLAUDE_PROMPT: ${{ inputs.prompt }}
          CAPSOLVER_API_KEY: ${{ secrets.CAPSOLVER_API_KEY }}
        run: |
          cd scripts
          python -u login.py "$COOKIE_INPUT_FILE" --prompt "$CLAUDE_PROMPT"

      - name: Upload Claude answer
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-answer
          path: |
            scripts/debug/answer.md
            scripts/debug/answer.txt
          if-no-files-found: ignore

      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-import-debug
          path: scripts/debug/
          if-no-files-found: ignore

      - name: Upload result screenshot
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: claude-after-import
          path: scripts/debug/claude-after-import.png
          if-no-files-found: error
